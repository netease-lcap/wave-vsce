<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave AI Chat</title>
    <link rel="stylesheet" href="{{STYLE_URI}}">
</head>
<body>
    <div class="chat-container" data-testid="chat-container">
        <div class="chat-header" data-testid="chat-header">
            <div class="chat-title">Wave AI Chat</div>
            <div class="header-buttons">
                <button class="header-button" onclick="getWorkspaceInfo()" data-testid="analyze-project-btn">Analyze Project</button>
                <button class="header-button" onclick="clearChat()" data-testid="clear-chat-btn">Clear Chat</button>
            </div>
        </div>
        
        <div class="messages-container" id="messagesContainer" data-testid="messages-container">
            <div class="message assistant" data-testid="welcome-message">
                <div class="message-content">Hello! I'm your AI assistant. I can help you with your current project, write code, and modify files. How can I assist you today?</div>
            </div>
        </div>
        
        <div class="input-container" data-testid="input-container">
            <div class="input-row">
                <textarea 
                    class="message-input" 
                    id="messageInput" 
                    placeholder="Type your message here..."
                    rows="1"
                    data-testid="message-input"
                ></textarea>
                <button class="abort-button" id="abortButton" onclick="abortMessage()" style="display: none;" data-testid="abort-btn">Abort</button>
                <button class="send-button" id="sendButton" onclick="sendMessage()" data-testid="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="{{SCRIPT_URI}}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave AI 聊天</title>
    <link rel="stylesheet" href="{{STYLE_URI}}">
</head>
<body>
    <div class="chat-container" data-testid="chat-container">
        <div class="chat-header" data-testid="chat-header">
            <div class="chat-title">Wave AI 聊天</div>
            <div class="header-buttons">
                <button class="header-button" onclick="getWorkspaceInfo()" data-testid="analyze-project-btn">分析项目</button>
                <button class="header-button" onclick="clearChat()" data-testid="clear-chat-btn">清除聊天</button>
            </div>
        </div>
        
        <div class="messages-container" id="messagesContainer" data-testid="messages-container">
            <div class="message assistant" data-testid="welcome-message">
                <div class="message-content">您好！我是您的 AI 助手。我可以帮助您处理当前项目、编写代码和修改文件。今天我能为您做些什么吗？</div>
            </div>
        </div>
        
        <div class="input-container" data-testid="input-container">
            <div class="input-row">
                <textarea 
                    class="message-input" 
                    id="messageInput" 
                    placeholder="在这里输入您的消息..."
                    rows="1"
                    data-testid="message-input"
                ></textarea>
                <button class="abort-button" id="abortButton" onclick="abortMessage()" style="display: none;" data-testid="abort-btn">停止</button>
                <button class="send-button" id="sendButton" onclick="sendMessage()" data-testid="send-btn">发送</button>
            </div>
        </div>
    </div>

    <script src="{{SCRIPT_URI}}"></script>
</body>
</html>

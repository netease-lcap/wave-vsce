image: mcr.microsoft.com/playwright:v1.49.0-jammy

variables:
  PLAYWRIGHT_BROWSERS_PATH: $CI_PROJECT_DIR/pw-browsers

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - $PLAYWRIGHT_BROWSERS_PATH

stages:
  - install
  - build
  - test

install_dependencies:
  stage: install
  script:
    - npm ci
    - npx playwright install chromium
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build_and_typecheck:
  stage: build
  script:
    - npm run clean
    - npm run compile
    - npx tsc --noEmit
    - npx tsc -p webview/tsconfig.json --noEmit
  artifacts:
    paths:
      - dist/
      - webview/dist/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

run_tests:
  stage: test
  cache: {}
  dependencies:
    - install_dependencies
    - build_and_typecheck
  script:
    - npm run test:playwright
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
